<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1 | Nemo Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient-1: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-primary: #0284c7;
            --accent-secondary: #4f46e5;
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: all 0.3s ease;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .background-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-primary) 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }

        .blob-1 { top: -100px; right: -100px; }
        .blob-2 { bottom: -100px; left: -100px; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 1rem 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            background: var(--card-bg);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-link.active {
            color: var(--accent-primary);
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover { transform: translateY(-5px); }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0.5rem 0;
            color: var(--accent-primary);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 1.5rem;
        }

        .chart-card img {
            width: 100%;
            border-radius: 0.75rem;
        }

        .btn-page2 {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--gradient-1);
            color: white;
            padding: 1rem 2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 700;
            margin-top: 2rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        .btn-page2:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(56, 189, 248, 0.3);
        }

        footer {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
        }

        @media (max-width: 768px) {
            .chart-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2rem; }
            header { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <div class="container">
        <header>
            <div class="logo">
                <i data-lucide="building-2"></i>
                Nemo Analytics
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link active">Page 1: 대시보드</a>
                <a href="report.html" class="nav-link">Page 2: 상세 리포트</a>
            </nav>
            <button class="theme-toggle" id="themeToggle">
                <i data-lucide="moon" id="themeIcon"></i>
            </button>
        </header>

        <section class="hero" data-aos="fade-up">
            <h1>강남권 상업 부동산 데이터 분석 (Page 1)</h1>
            <p>네모(Nemo) 플랫폼 실시간 매물 인사이트 요약입니다.</p>
            <a href="report.html" class="btn-page2">Page 2 상세 보고서 읽기 <i data-lucide="arrow-right"></i></a>
        </section>

        <div class="stats-grid" data-aos="fade-up" data-aos-delay="100">
            <div class="stat-card">
                <div class="stat-label">총 분석 매물</div>
                <div class="stat-value">673</div>
                <div class="stat-label">건</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">평균 보증금</div>
                <div class="stat-value">68,955</div>
                <div class="stat-label">만원</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">평균 월세</div>
                <div class="stat-value">5,346</div>
                <div class="stat-label">만원</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">평균 권리금</div>
                <div class="stat-value">46,405</div>
                <div class="stat-label">만원</div>
            </div>
        </div>

        <h2 class="section-title"><i data-lucide="bar-chart-3"></i> 시각화 요약</h2>
        <div class="chart-grid">
            <div class="chart-card" data-aos="zoom-in">
                <h3>보증금 분포</h3>
                <img src="images/01_deposit_dist.png" alt="보증금 분포">
            </div>
            <div class="chart-card" data-aos="zoom-in" data-aos-delay="100">
                <h3>월세 분포</h3>
                <img src="images/02_rent_dist.png" alt="월세 분포">
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Nemo Analytics. All rights reserved. | <a href="report.html" style="color: var(--accent-primary);">Go to Page 2</a></p>
        </footer>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        lucide.createIcons();
        AOS.init({ once: true, duration: 1000 });
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;
        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            if (currentTheme === 'light') {
                body.removeAttribute('data-theme');
                themeIcon.setAttribute('data-lucide', 'moon');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
